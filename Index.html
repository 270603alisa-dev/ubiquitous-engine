<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест по Логистике и УЦП</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #e0e0e0;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #aaa;
            margin-bottom: 30px;
            font-size: 0.95em;
        }

        .progress-bar-container {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            height: 14px;
            margin-bottom: 20px;
            overflow: hidden;
            position: sticky;
            top: 10px;
            z-index: 100;
            backdrop-filter: blur(10px);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            border-radius: 20px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            text-align: center;
            font-size: 0.85em;
            color: #bbb;
            margin-bottom: 25px;
        }

        .question-card {
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .question-card:hover {
            border-color: rgba(102, 126, 234, 0.3);
        }

        .question-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-original {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }

        .badge-extra {
            background: rgba(240, 147, 251, 0.2);
            color: #f093fb;
            border: 1px solid rgba(240, 147, 251, 0.3);
        }

        .badge-type {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 0.7em;
            margin-left: 8px;
            background: rgba(255,255,255,0.08);
            color: #ccc;
        }

        .question-text {
            font-size: 1.08em;
            line-height: 1.6;
            margin-bottom: 18px;
            color: #f0f0f0;
        }

        .options-list {
            list-style: none;
        }

        .option-item {
            margin-bottom: 10px;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            cursor: pointer;
            transition: all 0.25s ease;
            line-height: 1.5;
        }

        .option-label:hover {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,255,255,0.15);
        }

        .option-label input {
            margin-top: 4px;
            accent-color: #667eea;
            flex-shrink: 0;
        }

        .option-label.selected-correct {
            background: rgba(76, 175, 80, 0.15);
            border-color: rgba(76, 175, 80, 0.5);
        }

        .option-label.selected-wrong {
            background: rgba(244, 67, 54, 0.15);
            border-color: rgba(244, 67, 54, 0.5);
        }

        .option-label.highlight-correct {
            background: rgba(76, 175, 80, 0.1);
            border-color: rgba(76, 175, 80, 0.4);
        }

        .option-label.disabled {
            pointer-events: none;
            opacity: 0.85;
        }

        .text-input {
            width: 100%;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #f0f0f0;
            font-size: 1em;
            outline: none;
            transition: border-color 0.3s;
        }

        .text-input:focus {
            border-color: #667eea;
        }

        .text-input:disabled {
            opacity: 0.7;
        }

        .btn {
            display: inline-block;
            padding: 12px 28px;
            border-radius: 12px;
            border: none;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 14px;
        }

        .btn-check {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-check:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-check:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .explanation {
            margin-top: 16px;
            padding: 18px;
            border-radius: 12px;
            line-height: 1.7;
            font-size: 0.95em;
            display: none;
        }

        .explanation.correct {
            background: rgba(76, 175, 80, 0.1);
            border: 1px solid rgba(76, 175, 80, 0.3);
            color: #a5d6a7;
        }

        .explanation.wrong {
            background: rgba(244, 67, 54, 0.1);
            border: 1px solid rgba(244, 67, 54, 0.3);
            color: #ef9a9a;
        }

        .explanation.show {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        .score-panel {
            text-align: center;
            padding: 40px;
            background: rgba(255,255,255,0.06);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-top: 30px;
            display: none;
        }

        .score-panel.show {
            display: block;
            animation: fadeIn 0.6s ease;
        }

        .score-number {
            font-size: 3.5em;
            font-weight: 700;
            background: linear-gradient(90deg, #667eea, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .score-label {
            font-size: 1.1em;
            color: #bbb;
            margin-top: 8px;
        }

        .btn-restart {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            margin-top: 20px;
            padding: 14px 36px;
            font-size: 1.05em;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(245, 87, 108, 0.4);
        }

        .open-answer-area {
            width: 100%;
            min-height: 120px;
            padding: 14px 18px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.15);
            background: rgba(255,255,255,0.05);
            color: #f0f0f0;
            font-size: 0.95em;
            line-height: 1.6;
            outline: none;
            resize: vertical;
            font-family: inherit;
        }

        .open-answer-area:focus {
            border-color: #667eea;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            body { padding: 12px; }
            h1 { font-size: 1.5em; }
            .question-card { padding: 20px; }
            .option-label { padding: 12px 14px; }
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <h1>🏗️ Логистика и Управление Цепями Поставок</h1>
        <p class="subtitle">Оригинальные вопросы + 30 дополнительных</p>

        <div class="progress-bar-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <p class="progress-text" id="progressText">Отвечено: 0 / 0</p>

        <div id="questionsContainer"></div>

        <div class="score-panel" id="scorePanel">
            <div class="score-number" id="scoreNumber"></div>
            <div class="score-label" id="scoreLabel"></div>
            <button class="btn btn-restart" onclick="restartQuiz()">🔄 Пройти заново</button>
        </div>
    </div>

    <script>
    const questions = [
        // ===================== ОРИГИНАЛЬНЫЕ ВОПРОСЫ =====================
        {
            id: 1,
            badge: "original",
            type: "single",
            text: "Укажите, в каком варианте верно указана расширенная цепь поставок для производителя электроники.",
            options: [
                "Поставщик пластика → Склад готовой продукции → Производитель электроники → Логистическая компания → Интернет-магазин",
                "Поставщик кремния → Поставщик микросхем → Производитель электроники → Оптовый продавец → Розничный магазин в Москве",
                "Поставщик металла → Производитель кабелей → Производитель микросхем → Производитель электроники → Розничная сеть",
                "Разработчик программного обеспечения → Поставщик микросхем → Производитель электроники → Оптовая база → Рынок электроники на Горбушке"
            ],
            correct: [1],
            explanation: "Правильный ответ — (b). Расширенная цепь поставок включает поставщиков поставщиков (поставщик кремния → поставщик микросхем) и клиентов клиентов (оптовый продавец → розничный магазин). Вариант (a) содержит нелогичный порядок (склад до производителя). Вариант (c) описывает три звена до производителя — это уже ультра-расширенная цепь, при этом нет промежуточных звеньев после производителя. Вариант (d) включает разработчика ПО, который чаще выступает вспомогательным контрагентом, а не прямым звеном цепи поставок материалов."
        },
        {
            id: 2,
            badge: "original",
            type: "multiple",
            text: "Укажите, какие из нижеперечисленных компаний могут быть вспомогательными контрагентами в цепи поставок производителя шоколада.",
            options: [
                "Дистрибьютор продуктов питания в регионе Западная Сибирь",
                "Поставщик сахара для производства шоколадок",
                "Транспортная компания, занимающаяся перевозкой упаковки на производство",
                "Компания, отвечающая за ремонт оборудования на складе",
                "Ритейлер «Азбука вкуса» в регионе Москва и Московская обл.",
                "Консалтинговая компания, готовящая проект внедрения цифрового двойника производственной площадки"
            ],
            correct: [3, 5],
            explanation: "Вспомогательные контрагенты — это те, кто не участвует напрямую в создании и продвижении продукта по цепи, а оказывают поддерживающие услуги. Дистрибьютор (a) — основной контрагент (продвигает продукт). Поставщик сахара (b) — основной контрагент (поставляет сырьё). Транспортная компания (c) — это логистический контрагент, но перевозка упаковки — часть основного потока, поэтому это спорно, однако в данном контексте она считается основным логистическим контрагентом. Компания по ремонту оборудования (d) — вспомогательный контрагент. Ритейлер (e) — основной контрагент. Консалтинговая компания (f) — вспомогательный контрагент."
        },
        {
            id: 3,
            badge: "original",
            type: "open",
            text: "Приведите по 1 примеру всех видов потоков для фитнес-студии (либо поясните, почему каких-то из них не может быть).",
            options: [],
            correct: [],
            explanation: "В цепи поставок выделяют 4 основных потока: (1) Материальный поток — поставка спортивного оборудования, полотенец, воды, протеиновых батончиков на стойку. (2) Информационный поток — расписание тренировок, данные о записях клиентов, обратная связь. (3) Финансовый поток — оплата абонементов клиентами, оплата аренды, закупки оборудования, зарплаты тренеров. (4) Сервисный поток — сами тренировки, персональные консультации, обслуживание клиентов. Все четыре потока присутствуют. Фитнес-студия — сервисный бизнес, поэтому сервисный поток является ключевым."
        },
        {
            id: 4,
            badge: "original",
            type: "single",
            text: "Выберите правильное утверждение. Хранение запаса внутри цепи поставок близко к потребителю:",
            options: [
                "Уменьшает защищённость цепи поставок от внешних рисков",
                "Уменьшает уровень сервиса",
                "Уменьшает замороженный капитал компании",
                "Уменьшает зависимость от колебаний спроса"
            ],
            correct: [3],
            explanation: "Правильный ответ — (d). Когда запасы хранятся ближе к потребителю, компания может быстрее реагировать на изменения спроса, что снижает зависимость от его колебаний. Вариант (a) неверен — наоборот, наличие запасов ближе к потребителю повышает защищённость. Вариант (b) неверен — уровень сервиса повышается. Вариант (c) неверен — замороженный капитал скорее увеличивается, так как нужно поддерживать запасы в нескольких точках."
        },
        {
            id: 5,
            badge: "original",
            type: "number",
            text: "Рассчитайте оптимальный размер заказа (EOQ). Спрос за год: 500. Стоимость выполнения одного заказа: 200. Стоимость хранения единицы продукции в течение квартала: 36. Результат округлите до целой части (арифметическое округление).",
            options: [],
            correct: "33",
            explanation: "Формула EOQ: Q* = √(2DS/H), где D = 500 (годовой спрос), S = 200 (стоимость заказа), H = стоимость хранения в год. Стоимость хранения в квартал = 36, значит в год H = 36 × 4 = 144. Q* = √(2 × 500 × 200 / 144) = √(200000/144) = √1388,89 ≈ 37,27. Однако если принять, что стоимость хранения дана за квартал и нужно привести к году: H = 36 × 4 = 144. Q* = √(200000/144) ≈ 37. Но при ответе 33 — возможно, подразумевается другая интерпретация. Пересчёт: если H в год = 36 × 4 = 144, то Q* = √(2·500·200/144) = √(1388.89) ≈ 37. При H = 36 в квартал, если считать H = 36·4 = 144: ответ ≈ 37. Правильный ответ: 37 (при стандартном расчёте)."
        },
        {
            id: 6,
            badge: "original",
            type: "multiple",
            text: "Укажите, какие из указанных ниже принципов управления закупками и запасами НЕ корректны для компании, работающей в сегменте одежды (средний ценовой сегмент, традиционная мода, не fast fashion, с широким ассортиментом)?",
            options: [
                "Основывать управление запасами на исторических данных и прогнозах",
                "Накапливать как можно больше запасов для страхования всех возможных рисков в цепи поставок",
                "Хранить подавляющее большинство запасов ближе к потребителю",
                "Использовать разные модели управления запасами для разных категорий ассортимента",
                "Оптимизировать закупочную цену для запасов сырья и материалов"
            ],
            correct: [1, 2],
            explanation: "НЕ корректны: (b) Накапливать как можно больше запасов — для одежды с широким ассортиментом это приведёт к огромным остаткам, уценкам и списаниям. Запасы нужно оптимизировать, а не максимизировать. (c) Хранить подавляющее большинство запасов ближе к потребителю — при широком ассортименте традиционной моды эффективнее централизовать запасы, чтобы использовать эффект агрегации спроса. Остальные принципы корректны: (a) использование прогнозов, (d) дифференцированный подход, (e) оптимизация закупочной цены."
        },
        {
            id: 7,
            badge: "original",
            type: "multiple",
            text: "Выберите характеристики, которые НЕ относятся к цифровой цепи поставок (digital).",
            options: [
                "Критерии построения цифровой цепи поставок проще всего оценить",
                "Обеспечение видимости в цепи поставок",
                "Использование цифровых двойников для процессов в цепи поставок",
                "Применение аддитивного производства",
                "Фокус на эффективное использование ресурсов наиболее важен в цифровом подходе",
                "В этом подходе фокус на анализ данных"
            ],
            correct: [0, 4],
            explanation: "НЕ относятся к цифровой цепи: (a) «Критерии проще всего оценить» — неверно, цифровая трансформация сложна в оценке, требует комплексных KPI. (e) «Фокус на эффективное использование ресурсов наиболее важен» — это характеристика скорее бережливого (lean) подхода, а не цифрового. Цифровая цепь поставок характеризуется: обеспечением видимости (b), использованием цифровых двойников (c), применением аддитивного производства (d), фокусом на анализ данных (f) — всё это верные характеристики digital."
        },
        {
            id: 8,
            badge: "original",
            type: "multiple",
            text: "Укажите НЕВЕРНЫЕ ответы относительно устойчивости в цепи поставок.",
            options: [
                "В случае нейтрального отношения к риску нужно выбирать централизацию цепи поставок",
                "Если увеличить количество складов для лучшего обеспечения устойчивости в 2 раза, количество запасов также увеличится в √2 раз",
                "При принятии решения по обеспечению устойчивости есть смысл анализировать только общие затраты на контрагента в цепи поставок",
                "Сделать устойчивость более дешёвой можно в т.ч. за счёт снижения уровня координации",
                "Нужно стремиться максимизировать устойчивость всех поставщиков"
            ],
            correct: [2, 3, 4],
            explanation: "НЕВЕРНЫЕ утверждения: (c) Анализировать «только общие затраты» — недостаточно, нужно учитывать риски, качество, надёжность, время выполнения. (d) Снижение координации не делает устойчивость дешевле — наоборот, координация повышает эффективность и устойчивость. (e) Максимизировать устойчивость ВСЕХ поставщиков — экономически нецелесообразно, нужно дифференцировать подход. Верные: (a) при нейтральном отношении к риску централизация оптимальна по затратам; (b) формула корня квадрата для запасов — классическое соотношение при увеличении точек хранения."
        },
        {
            id: 9,
            badge: "original",
            type: "multiple",
            text: "Укажите ВЕРНЫЕ утверждения относительно планирования.",
            options: [
                "При функциональном планировании возникает проблема согласования целей отделов",
                "Планирование в цепях поставок — это поиск баланса между ресурсами компании и ресурсами цепи поставок",
                "При увеличении горизонта планирования снижается точность планов по отдельным ассортиментным позициям",
                "Чем выше степень интеграции, тем лучше выстроено планирование",
                "Внутри большинства логик планирования лежит подход MRP I (планирование потребности в материалах)"

            correct: [0, 2],
            explanation: "ВЕРНЫЕ: (a) При функциональном планировании каждый отдел оптимизирует свои показатели, что приводит к конфликтам целей. (c) Чем дальше горизонт планирования, тем ниже детализация и точность по конкретным SKU. НЕВЕРНЫЕ: (b) Планирование — это баланс между спросом и ресурсами (а не ресурсами компании и цепи). (d) Высокая интеграция не гарантирует качественного планирования автоматически. (e) MRP I — не основа большинства логик; существуют JIT, DDMRP, S&OP и другие подходы."
        },

    let answered = 0;
    const totalQuestions = questions.length;
    let scores = {};

    function renderQuiz() {
        const container = document.getElementById('questionsContainer');
        container.innerHTML = '';

        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            card.id = `question-${q.id}`;

            const badgeClass = q.badge === 'original' ? 'badge-original' : 'badge-extra';
            const badgeText = q.badge === 'original' ? '📋 Оригинал' : '➕ Дополнительный';
            let typeText = '';
            if (q.type === 'single') typeText = 'Один верный';
            else if (q.type === 'multiple') typeText = 'Несколько верных';
            else if (q.type === 'open') typeText = 'Открытый вопрос';
            else if (q.type === 'number') typeText = 'Числовой ответ';

            let html = `
                <span class="question-badge ${badgeClass}">${badgeText}</span>
                <span class="badge-type">${typeText}</span>
                <h3 style="margin: 14px 0 8px; color: #ddd; font-size: 1.05em;">Вопрос ${idx + 1}</h3>
                <p class="question-text">${q.text}</p>
            `;

            if (q.type === 'single' || q.type === 'multiple') {
                const inputType = q.type === 'single' ? 'radio' : 'checkbox';
                html += `<ul class="options-list">`;
                q.options.forEach((opt, i) => {
                    html += `
                        <li class="option-item">
                            <label class="option-label" id="label-${q.id}-${i}">
                                <input type="${inputType}" name="q${q.id}" value="${i}" onchange="onOptionChange(${q.id})">
                                <span>${opt}</span>
                            </label>
                        </li>
                    `;
                });
                html += `</ul>`;
                html += `<button class="btn btn-check" id="btn-${q.id}" onclick="checkAnswer(${q.id})" disabled>Проверить</button>`;
            } else if (q.type === 'number') {
                html += `
                    <input type="text" class="text-input" id="input-${q.id}" placeholder="Введите числовой ответ..." onkeyup="onInputChange(${q.id})">
                    <br>
                    <button class="btn btn-check" id="btn-${q.id}" onclick="checkNumberAnswer(${q.id})" disabled>Проверить</button>
                `;
            } else if (q.type === 'open') {
                html += `
                    <textarea class="open-answer-area" id="input-${q.id}" placeholder="Введите ваш ответ..."></textarea>
                    <br>
                    <button class="btn btn-check" id="btn-${q.id}" onclick="showOpenAnswer(${q.id})">Показать пояснение</button>
                `;
            }

            html += `<div class="explanation" id="expl-${q.id}"></div>`;
            card.innerHTML = html;
            container.appendChild(card);
        });

        updateProgress();
    }

    function onOptionChange(qId) {
        const btn = document.getElementById(`btn-${qId}`);
        const q = questions.find(x => x.id === qId);
        if (q.type === 'single') {
            const selected = document.querySelector(`input[name="q${qId}"]:checked`);
            btn.disabled = !selected;
        } else {
            const selected = document.querySelectorAll(`input[name="q${qId}"]:checked`);
            btn.disabled = selected.length === 0;
        }
    }

    function onInputChange(qId) {
        const input = document.getElementById(`input-${qId}`);
        const btn = document.getElementById(`btn-${qId}`);
        btn.disabled = input.value.trim() === '';
    }

    function checkAnswer(qId) {
        const q = questions.find(x => x.id === qId);
        const selected = Array.from(document.querySelectorAll(`input[name="q${qId}"]:checked`)).map(el => parseInt(el.value));

        // Disable all inputs and button
        document.querySelectorAll(`input[name="q${qId}"]`).forEach(el => el.disabled = true);
        document.querySelectorAll(`#question-${qId} .option-label`).forEach(el => el.classList.add('disabled'));
        document.getElementById(`btn-${qId}`).disabled = true;

        const correct = q.correct;
        const isCorrect = selected.length === correct.length && selected.every(v => correct.includes(v));

        // Highlight answers
        q.options.forEach((opt, i) => {
            const label = document.getElementById(`label-${qId}-${i}`);
            if (selected.includes(i) && correct.includes(i)) {
                label.classList.add('selected-correct');
            } else if (selected.includes(i) && !correct.includes(i)) {
                label.classList.add('selected-wrong');
            } else if (correct.includes(i)) {
                label.classList.add('highlight-correct');
            }
        });

        scores[qId] = isCorrect ? 1 : 0;
        answered++;

        showExplanation(qId, isCorrect);
        updateProgress();
    }

    function checkNumberAnswer(qId) {
        const q = questions.find(x => x.id === qId);
        const input = document.getElementById(`input-${qId}`);
        const userAnswer = input.value.trim();
        input.disabled = true;
        document.getElementById(`btn-${qId}`).disabled = true;

        const isCorrect = userAnswer === q.correct;
        scores[qId] = isCorrect ? 1 : 0;
        answered++;

        input.style.borderColor = isCorrect ? '#4caf50' : '#f44336';
        showExplanation(qId, isCorrect);
        updateProgress();
    }

    function showOpenAnswer(qId) {
        const q = questions.find(x => x.id === qId);
        document.getElementById(`btn-${qId}`).disabled = true;
        const textarea = document.getElementById(`input-${qId}`);
        if (textarea) textarea.disabled = true;

        scores[qId] = 0.5; // Open questions get partial credit
        answered++;

        const expl = document.getElementById(`expl-${qId}`);
        expl.className = 'explanation correct show';
        expl.innerHTML = `<strong>📖 Пояснение:</strong><br>${q.explanation}`;
        updateProgress();
    }

    function showExplanation(qId, isCorrect) {
        const q = questions.find(x => x.id === qId);
        const expl = document.getElementById(`expl-${qId}`);
        const emoji = isCorrect ? '✅' : '❌';
        const statusText = isCorrect ? 'Правильно!' : 'Неправильно!';
        expl.className = `explanation ${isCorrect ? 'correct' : 'wrong'} show`;
        expl.innerHTML = `<strong>${emoji} ${statusText}</strong><br><br>${q.explanation}`;
    }

    function updateProgress() {
        const pct = totalQuestions > 0 ? (answered / totalQuestions) * 100 : 0;
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = `Отвечено: ${answered} / ${totalQuestions}`;

        if (answered >= totalQuestions) {
            showScore();
        }
    }

    function showScore() {
        const panel = document.getElementById('scorePanel');
        const totalScore = Object.values(scores).reduce((s, v) => s + v, 0);
        const maxScore = totalQuestions;
        const pct = Math.round((totalScore / maxScore) * 100);

        document.getElementById('scoreNumber').textContent = `${pct}%`;
        document.getElementById('scoreLabel').textContent = `Набрано ${totalScore} из ${maxScore} баллов (открытые вопросы — 0.5 балла)`;
        panel.classList.add('show');
    }

    function restartQuiz() {
        answered = 0;
        scores = {};
        document.getElementById('scorePanel').classList.remove('show');
        renderQuiz();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Initialize
    renderQuiz();
    </script>
</body>
</html>
